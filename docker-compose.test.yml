# 测试栈独立项目名 mnemo → 容器 mnemo-test-run-*、镜像 mnemo-test（与其余 mnemo-* 一致）。
name: mnemo

services:
  test:
    image: mnemo-test:latest
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      args:
        USE_USTC_MIRROR: "${USE_USTC_MIRROR:-1}"
    volumes:
      - ./shared:/app/shared
      - ./steps:/app/steps
      - ./api:/app/api
      - ./scheduler:/app/scheduler
      - ./worker:/app/worker
      - ./tests:/app/tests
      - ./configs:/app/configs
    command: >
      sh -c "pip install --quiet 'fakeredis[lua]>=2.28,<4' 'pytest>=8,<9' 'pytest-asyncio>=0.24,<1' && pytest -v -p no:cacheprovider"
