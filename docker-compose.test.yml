# 测试栈独立项目名 flori → 容器 flori-test-run-*、镜像 flori-test(与其余 flori-* 一致)。
name: flori-test

services:
  test:
    image: flori-test:latest
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      target: test-worker  # 本地用全量测试镜像(普通 test + [steps] 媒体库):任意模块/step 测试都能跑。
                           # CI 才拆两 job:普通 job 用 test(轻~350MB) + worker job 用 test-worker(重)。见 base.Dockerfile / ci.yml
      args:
        USE_USTC_MIRROR: "${USE_USTC_MIRROR:-1}"
    volumes:
      - ./shared:/app/shared
      - ./steps:/app/steps
      - ./api:/app/api
      - ./scheduler:/app/scheduler
      - ./worker:/app/worker
      - ./tests:/app/tests
      - ./configs:/app/configs
      # 变异分数驱动(scripts/mutation_score.py;mutation.yml 调用)
      - ./scripts:/app/scripts
      # selected OpenAPI 快照与 manifest 由后端契约测试直接校验。
      - ./frontend:/app/frontend
      # CI/workflow 结构不变量测试只读解析 workflow,不向容器写入.
      - ./.github:/app/.github:ro
      # 部署配置不变量测试解析 Compose/logging/healthcheck,全部只读挂载.
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./docker-compose.dev.yml:/app/docker-compose.dev.yml:ro
      - ./deploy:/app/deploy:ro
      - ./docs/08-deployment.md:/app/docs/08-deployment.md:ro
      # pytest/coverage 配置(markers、[tool.coverage])的单一事实源:挂进来,改了不用重建镜像
      - ./pyproject.toml:/app/pyproject.toml
      # schemathesis 检查配置(只跑 not_a_server_error + response_schema_conformance)
      - ./schemathesis.toml:/app/schemathesis.toml
      # pytest-split 时长档:--splits 按实测时长均衡分片,消除慢用例扎堆某 shard。
      # 改了用例分布后重新 `pytest --store-durations --durations-path .test_durations` 生成即可,不用重建镜像。
      - ./.test_durations:/app/.test_durations
    # 测试依赖([test] extra,单一事实源 pyproject)已烤进 test stage 镜像,见 base.Dockerfile;此处不做运行时
    # pip install,直接 pytest,省一笔安装、也不漂移。改 [test] 版本须重建镜像(CI buildcache 会自动跟随)。
    # 默认套件:跑 -m 'not fuzz' 的快测 + 分支覆盖率;fuzz(schemathesis,也已烤进镜像)单独手动跑:
    #   docker compose -f docker-compose.test.yml run --rm test \
    #     pytest -m fuzz tests/test_openapi_fuzz.py --no-cov -q
    # -n auto:pytest-xdist 多进程并行;用例进程内 fakeredis、无跨进程共享态,并行安全,实测 122s→53s。
    command: >
      pytest -p no:cacheprovider -m 'not fuzz' -n auto
      --cov=shared --cov=api --cov=scheduler --cov=worker --cov=steps
      --cov-branch --cov-report=term-missing --cov-fail-under=75
