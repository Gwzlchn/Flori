services:
  test:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      args:
        USE_USTC_MIRROR: "${USE_USTC_MIRROR:-1}"
    volumes:
      - ./shared:/app/shared
      - ./steps:/app/steps
      - ./api:/app/api
      - ./scheduler:/app/scheduler
      - ./worker:/app/worker
      - ./tests:/app/tests
      - ./configs:/app/configs
    command: >
      sh -c "pip install --quiet 'fakeredis[lua]>=2.25,<2.28' pytest pytest-asyncio && pytest -v -p no:cacheprovider"
