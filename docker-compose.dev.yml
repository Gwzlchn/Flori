# 显式项目名,避免回退目录名(flori)时 redis-data 等命名卷与生产同名 → 覆盖/串数据。
name: flori-dev

# 开发栈也可能常驻.local driver 压缩轮转,单容器最多约 10MB.
x-logging: &default-logging
  driver: local
  options:
    max-size: "5m"
    max-file: "2"
    compress: "true"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    logging: *default-logging
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      target: api
    command: python -m api.main
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared
      - ./api:/app/api
      - ./configs:/app/configs
      - ./scripts/dr_snapshot.py:/app/scripts/dr_snapshot.py:ro
      - ${FLORI_DATA_DIR:-./data}:/data
      - redis-data:/dr-source/redis:ro
      - ${MINIO_DATA_DIR:-minio-data}:/dr-source/minio:ro
      - ${FLORI_DR_BACKUP_DIR:-.local/exact-dr}:/exact-dr
      - ${FLORI_CONTENT_REPOSITORY_DIR:-.local/content-repository}:/content-repo
      # local_dir 订阅约定监听目录(放文件进宿主 ${FLORI_INBOX_DIR:-.local/inbox} 即被枚举入库);与 worker 挂同一容器路径。
      - ${FLORI_INBOX_DIR:-.local/inbox}:/data/inbox
      - ${FLORI_SOURCE_LIBRARY_DIR:-.local/source-library}:/sources/library:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - API_TOKEN=${API_TOKEN:-}
      - API_ALLOW_NO_AUTH=${API_ALLOW_NO_AUTH:-1}   # 本机开发默认放行(空 token 时);公网暴露设 0
      # app_credentials at-rest 加密的 Fernet key。空=明文落库;设 key 即加密。
      - FLORI_SECRET_KEY=${FLORI_SECRET_KEY:-}
      - FLORI_DISK_MIN_FREE_GB=${FLORI_DISK_MIN_FREE_GB:-5}
      - FLORI_DISK_MIN_FREE_PCT=${FLORI_DISK_MIN_FREE_PCT:-5}
      - FLORI_READINESS_PROBE_TTL_SEC=${FLORI_READINESS_PROBE_TTL_SEC:-5}
      - FLORI_READINESS_PROBE_TIMEOUT_SEC=${FLORI_READINESS_PROBE_TIMEOUT_SEC:-3}
      - API_RELOAD=1   # 开发热更新(生产默认关,避免 StatReload 常驻)
      - FLORI_SOURCE_LIBRARY_ENABLED=${FLORI_SOURCE_LIBRARY_ENABLED:-0}
      - FLORI_SOURCE_LIBRARY_ROOT_ID=${FLORI_SOURCE_LIBRARY_ROOT_ID:-library}
      - FLORI_SOURCE_LIBRARY_CONTAINER_DIR=/sources/library
      - FLORI_CONTENT_REPOSITORY=/content-repo
      - FLORI_DEPLOYMENT_ID=${FLORI_DEPLOYMENT_ID:-}
      - FLORI_EXACT_DR_DIR=/exact-dr
      - FLORI_EXACT_DR_DRAIN_TIMEOUT_SEC=${FLORI_EXACT_DR_DRAIN_TIMEOUT_SEC:-3600}
      - FLORI_DR_OWNER_UID=${FLORI_DR_OWNER_UID:-}
      - FLORI_DR_OWNER_GID=${FLORI_DR_OWNER_GID:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      target: scheduler
    command: python -m scheduler.main
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./shared:/app/shared
      - ./scheduler:/app/scheduler
      - ./configs:/app/configs
      - ${FLORI_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
    depends_on:
      - redis

  worker-cpu:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      target: worker
    command: python -m worker.main --pools cpu
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker
      - ./steps:/app/steps
      - ./configs:/app/configs
      - ${FLORI_DATA_DIR:-./data}:/data
      # local_dir 订阅:worker 复制源文件,须与 api 挂同一容器路径 /data/inbox。
      - ${FLORI_INBOX_DIR:-.local/inbox}:/data/inbox
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - FLORI_STEP_LOG_MAX_BYTES=${FLORI_STEP_LOG_MAX_BYTES:-10485760}
      - FLORI_DOCKER_CONTROL_TIMEOUT_SEC=${FLORI_DOCKER_CONTROL_TIMEOUT_SEC:-5}
    depends_on:
      - redis

  worker-ai:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      target: worker
    command: python -m worker.main --pools ai
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker
      - ./steps:/app/steps
      - ./configs:/app/configs
      - ${FLORI_DATA_DIR:-./data}:/data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - FLORI_STEP_LOG_MAX_BYTES=${FLORI_STEP_LOG_MAX_BYTES:-10485760}
      - FLORI_DOCKER_CONTROL_TIMEOUT_SEC=${FLORI_DOCKER_CONTROL_TIMEOUT_SEC:-5}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DRY_RUN=${DRY_RUN:-0}
    depends_on:
      - redis

  worker-source:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      target: worker
    command: python -m worker.main --pools io cpu ai
    restart: unless-stopped
    profiles: ["source-library"]
    logging: *default-logging
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker
      - ./steps:/app/steps
      - ./configs:/app/configs
      - ${FLORI_DATA_DIR:-./data}:/data
      - ${FLORI_SOURCE_LIBRARY_DIR:-.local/source-library}:/sources/library:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - CONFIG_DIR=/app/configs
      - WORKER_NAME=source-library
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DRY_RUN=${DRY_RUN:-0}
      - FLORI_SOURCE_LIBRARY_ENABLED=${FLORI_SOURCE_LIBRARY_ENABLED:-0}
      - FLORI_SOURCE_LIBRARY_ROOT_ID=${FLORI_SOURCE_LIBRARY_ROOT_ID:-library}
      - FLORI_SOURCE_LIBRARY_CONTAINER_DIR=/sources/library
      - FLORI_SOURCE_LIBRARY_HOST_DIR=${FLORI_SOURCE_LIBRARY_DIR:-}
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      target: build
    command: npx vite --host 0.0.0.0
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
    depends_on:
      - api

  # 日志面板。默认仅绑本机;局域网访问设 DOZZLE_BIND_IP=<局域网IP>。
  # 可选接入远程 dozzle agent(host:port,如经 SSH 隧道转发)设 DOZZLE_REMOTE_AGENT。
  dozzle:
    image: amir20/dozzle
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DOZZLE_REMOTE_AGENT=${DOZZLE_REMOTE_AGENT:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_BIND_IP:-127.0.0.1}:${DOZZLE_PORT:-8888}:8080"

volumes:
  redis-data:
  minio-data:
