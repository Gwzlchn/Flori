name: CI

# push/PR 跑测试；合并到 main 后构建并推送镜像到 ghcr.io。
# 纯文档提交(*.md / docs / ROADMAP / .local)不触发 CI —— 不跑测试、不重建镜像(paths-ignore)。
on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'ROADMAP.md', '.local/**']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'ROADMAP.md', '.local/**']

# ★后端单测【按"普通 vs worker"拆两 job 并行】(与部署镜像同理拆):
#   unit-normal:轻镜像 test([api,worker,mcp,test],~350MB,build/load 秒级)跑【非 step 测试】(绝大多数)。
#   unit-worker:重镜像 test-worker(test + ffmpeg + [steps] 媒体库)跑【step/worker 测试】(tests/steps + test_step_* + test_worker)。
#   各产【部分覆盖率】上传;coverage-gate 合并判 75%。关键路径 = max(两 job) → build-push,压 <2min。
jobs:
  unit-normal:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      USE_USTC_MIRROR: "0"
    steps:
      - uses: actions/checkout@v6
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: 稳定 pip 缓存(取真实版本 + 抹 pyproject version 为占位)
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build 普通 test 镜像(target test,轻)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base.Dockerfile
          target: test
          tags: flori-test:latest
          load: true
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/flori-test:buildcache
            type=gha,scope=flori-test
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=ghcr.io/{0}/flori-test:buildcache,mode=max', env.OWNER_LC) || 'type=gha,scope=flori-test,mode=max' }}
      # 非 step 测试(--ignore 掉 tests/steps 目录 + 根 tests/test_step_*.py + test_worker.py → 归 unit-worker)。
      - name: Unit tests(普通,非 step)+ 部分覆盖率
        run: |
          mkdir -p covdata
          docker compose -f docker-compose.test.yml run --rm \
            -v "$GITHUB_WORKSPACE/covdata:/covdata" -e COVERAGE_FILE=/covdata/.coverage.normal \
            test \
            pytest -p no:cacheprovider -m 'not fuzz' -n auto \
              --ignore=tests/steps --ignore-glob='tests/test_step_*.py' --ignore=tests/test_worker.py \
              --cov=shared --cov=api --cov=scheduler --cov=worker --cov=steps \
              --cov-branch --cov-report=
      - uses: actions/upload-artifact@v4
        with:
          name: cov-normal
          path: covdata/.coverage.normal
          include-hidden-files: true

  unit-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      USE_USTC_MIRROR: "0"
    steps:
      - uses: actions/checkout@v6
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: 稳定 pip 缓存(取真实版本 + 抹 pyproject version 为占位)
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build worker test 镜像(target test-worker,含 [steps] 媒体库)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base.Dockerfile
          target: test-worker
          tags: flori-test:latest
          load: true
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/flori-test-worker:buildcache
            type=gha,scope=flori-test-worker
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=ghcr.io/{0}/flori-test-worker:buildcache,mode=max', env.OWNER_LC) || 'type=gha,scope=flori-test-worker,mode=max' }}
      # step/worker 测试(tests/steps 目录 + 根 tests/test_step_*.py + test_worker.py;真需媒体库,在 test-worker 镜像跑)。
      - name: Unit tests(step/worker)+ 部分覆盖率
        run: |
          mkdir -p covdata
          docker compose -f docker-compose.test.yml run --rm \
            -v "$GITHUB_WORKSPACE/covdata:/covdata" -e COVERAGE_FILE=/covdata/.coverage.worker \
            test \
            pytest -p no:cacheprovider -m 'not fuzz' -n auto \
              tests/steps tests/test_step_*.py tests/test_worker.py \
              --cov=shared --cov=api --cov=scheduler --cov=worker --cov=steps \
              --cov-branch --cov-report=
      - uses: actions/upload-artifact@v4
        with:
          name: cov-worker
          path: covdata/.coverage.worker
          include-hidden-files: true

  # 合并【普通 + worker】两份部分覆盖率 → 判分支覆盖率门 75%(拆 job 后不能各自判,部分覆盖会误判)。
  # 在轻镜像 test 里 combine:源码 /app/* 与两 job 记录路径一致,不需 [paths] 重映射;test 镜像轻、build 快。
  coverage-gate:
    needs: [unit-normal, unit-worker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cov: ${{ steps.cov.outputs.pct }}
    env:
      USE_USTC_MIRROR: "0"
    steps:
      - uses: actions/checkout@v6
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: 稳定 pip 缓存(抹 version 为占位)
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
      - name: Build 普通 test 镜像(buildcache 命中,轻)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base.Dockerfile
          target: test
          tags: flori-test:latest
          load: true
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/flori-test:buildcache
            type=gha,scope=flori-test
      - name: Download 两份部分覆盖率
        uses: actions/download-artifact@v4
        with:
          pattern: cov-*
          path: covdata
          merge-multiple: true          # cov-normal + cov-worker → covdata/.coverage.{normal,worker}
      - name: Combine 覆盖率 + 判分支覆盖率门(--fail-under=75)
        id: cov
        run: |
          docker compose -f docker-compose.test.yml run --rm \
            -v "$GITHUB_WORKSPACE/covdata:/covdata" test \
            sh -c 'cp /covdata/.coverage.* /app/ && cd /app && coverage combine && coverage report --fail-under=75' \
            | tee /tmp/cov.log
          pct=$(awk '/^TOTAL/{gsub("%","",$NF); print $NF}' /tmp/cov.log | tail -1)
          pct=${pct:-unknown}
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
          echo "### 🐍 后端分支覆盖率(合并 普通+worker):${pct}%" >> "$GITHUB_STEP_SUMMARY"

  # 注:OpenAPI 模糊/契约(schemathesis)已拆到独立每日 cron(.github/workflows/fuzz.yml),不拖慢 push CI。

  # 前端单测 + 覆盖率(容器化 vitest;node:20-alpine)。与后端并行,各自为门。
  fe-test:
    runs-on: ubuntu-latest
    outputs:
      cov: ${{ steps.cov.outputs.pct }}
    steps:
      - uses: actions/checkout@v6
      - name: Frontend unit tests + 覆盖率(vitest)
        id: cov
        run: |
          docker compose -f docker-compose.fe-test.yml run --rm \
            -e npm_config_registry=https://registry.npmjs.org fe-test | tee /tmp/fe-cov.log
          pct=$(grep -oP 'Statements\s*:\s*\K[0-9.]+' /tmp/fe-cov.log | tail -1 || true)
          pct=${pct:-unknown}
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
          echo "### 🟢 前端语句覆盖率:${pct}%" >> "$GITHUB_STEP_SUMMARY"

  # 改动路径侦测:据此让 build-push 只重建【相关】镜像(前端-only 不重建后端,反之亦然)。
  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.f.outputs.backend }}
      frontend: ${{ steps.f.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            backend:
              - 'shared/**'
              - 'steps/**'
              - 'api/**'
              - 'scheduler/**'
              - 'worker/**'
              - 'tunnel_stats/**'
              - 'configs/**'
              - 'docker/**'
              - 'pyproject.toml'
            frontend:
              - 'frontend/**'

  # 仅 main:把前后端覆盖率写成 shields endpoint JSON,force-push 到 badges 数据分支。
  coverage-badge:
    needs: [coverage-gate, fe-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 生成覆盖率徽章 JSON 并 force-push badges 分支
        env:
          BE: ${{ needs.coverage-gate.outputs.cov }}
          FE: ${{ needs.fe-test.outputs.cov }}
        run: |
          col() { awk -v p="$1" 'BEGIN{n=p+0; print (n>=80)?"brightgreen":(n>=60)?"yellow":"orange"}'; }
          mkdir badges && cd badges
          printf '{"schemaVersion":1,"label":"backend cov","message":"%s%%","color":"%s"}\n' "$BE" "$(col "$BE")" > coverage-backend.json
          printf '{"schemaVersion":1,"label":"frontend cov","message":"%s%%","color":"%s"}\n' "$FE" "$(col "$FE")" > coverage-frontend.json
          git init -q -b badges
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage-backend.json coverage-frontend.json
          git commit -q -m "chore(badges): 覆盖率 be=${BE}% fe=${FE}% [skip ci]"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" badges

  # 测试过才构建镜像(amd64)。PR 也构建(验 Dockerfile/前端 vue-tsc),推送仅 main。
  # 路径过滤:仅重建【本次改动相关】的镜像(前端-only 跳后端 3 镜像,后端-only 跳前端)。
  build-push:
    needs: [unit-normal, unit-worker, fe-test, detect]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: flori-scheduler
            dockerfile: docker/base.Dockerfile
            context: .
            target: scheduler
          - image: flori-api
            dockerfile: docker/base.Dockerfile
            context: .
            target: api
          - image: flori-worker
            dockerfile: docker/base.Dockerfile
            context: .
            target: worker
          - image: flori-frontend  # nginx + 构建好的 Vue 静态资源(无 target → 建末 stage)
            dockerfile: frontend/Dockerfile
            context: ./frontend
    steps:
      - uses: actions/checkout@v6
      - name: 是否需要构建本镜像
        id: gate
        run: |
          if [ "${{ matrix.image }}" = "flori-frontend" ]; then
            want="${{ needs.detect.outputs.frontend }}"
          else
            want="${{ needs.detect.outputs.backend }}"
          fi
          echo "build=$want" >> "$GITHUB_OUTPUT"
          [ "$want" = "true" ] && echo "→ 构建 ${{ matrix.image }}" || echo "→ 跳过 ${{ matrix.image }}(无相关改动)"
      - name: Lowercase owner
        if: steps.gate.outputs.build == 'true'
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: 稳定 pip 缓存(取真实版本 + 抹 pyproject version 为占位)
        if: steps.gate.outputs.build == 'true'
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
        if: steps.gate.outputs.build == 'true'
      - name: Log in to ghcr.io
        if: steps.gate.outputs.build == 'true' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags
        id: meta
        if: steps.gate.outputs.build == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - name: Build and push
        if: steps.gate.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_BUILD_SHA=${{ github.sha }}
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}:buildcache
            type=gha
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=ghcr.io/{0}/{1}:buildcache,mode=max', env.OWNER_LC, matrix.image) || 'type=gha,mode=max' }}
