name: CI

# push/PR 跑测试；合并到 main 后构建并推送镜像到 ghcr.io。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 容器内跑全部单元测试（与本地 docker compose test 同路径）。
  test:
    runs-on: ubuntu-latest
    env:
      USE_USTC_MIRROR: "0"     # 海外 runner 用官方源
    steps:
      - uses: actions/checkout@v6
      - name: Unit tests in container
        run: |
          docker compose -f docker-compose.test.yml build
          docker compose -f docker-compose.test.yml run --rm test

  # 仅 main：测试通过后构建镜像（amd64；所有目标机均为 x86）并推送。
  build-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 推镜像到 ghcr.io 用内置 GITHUB_TOKEN
    strategy:
      matrix:
        include:
          - image: mnemo           # api/scheduler/worker 共用
            dockerfile: docker/base.Dockerfile
            context: .
          - image: mnemo-frontend  # nginx + 构建好的 Vue 静态资源
            dockerfile: frontend/Dockerfile
            context: ./frontend
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            USE_USTC_MIRROR=0
          cache-from: type=gha
          cache-to: type=gha,mode=max
