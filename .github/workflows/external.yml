name: External content (manual)

# 公网来源波动不进入每次 push 的 required gate. 人工运行时缺 URL 或网络失败均为非成功,
# 不把未执行场景伪装成通过. URL 只能放公开仓库 variables,不得包含凭证或 secret query.
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "要验证的公网来源"
        required: true
        default: all
        type: choice
        options: [all, article, audio, rss, youtube]

jobs:
  external-content:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    env:
      USE_USTC_MIRROR: "0"
      TEST_WARM_NAME: flori-external-${{ github.run_id }}-${{ github.run_attempt }}
      INTEGRATION_EXTERNAL_IMAGE: flori-external-test:${{ github.run_id }}-${{ github.run_attempt }}
      FLORI_EXTERNAL_ARTICLE_URL: ${{ vars.FLORI_EXTERNAL_ARTICLE_URL }}
      FLORI_EXTERNAL_AUDIO_URL: ${{ vars.FLORI_EXTERNAL_AUDIO_URL }}
      FLORI_EXTERNAL_RSS_URL: ${{ vars.FLORI_EXTERNAL_RSS_URL }}
      FLORI_EXTERNAL_YOUTUBE_URL: ${{ vars.FLORI_EXTERNAL_YOUTUBE_URL }}
    steps:
      - uses: actions/checkout@v6
      - name: Validate selected public URL variables
        env:
          SCENARIO: ${{ inputs.scenario }}
        run: |
          case "$SCENARIO" in
            all) names=(ARTICLE AUDIO RSS YOUTUBE) ;;
            article) names=(ARTICLE) ;;
            audio) names=(AUDIO) ;;
            rss) names=(RSS) ;;
            youtube) names=(YOUTUBE) ;;
          esac
          missing=0
          for name in "${names[@]}"; do
            var="FLORI_EXTERNAL_${name}_URL"
            value="${!var:-}"
            if [ -z "${value//[[:space:]]/}" ]; then
              echo "::error::SKIPPED ${name,,}: $var 未配置"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: 稳定 pip 缓存(取真实版本 + 抹 pyproject version 为占位)
        run: |
          echo "FLORI_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)" >> "$GITHUB_ENV"
          sed -i 's/^version = .*/version = "0.0.0"/' pyproject.toml
      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build external test image(target test-worker)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base.Dockerfile
          target: test-worker
          tags: ${{ env.INTEGRATION_EXTERNAL_IMAGE }}
          load: true
          build-args: |
            USE_USTC_MIRROR=0
            FLORI_VERSION=${{ env.FLORI_VERSION }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/flori-test-worker:buildcache
            type=gha,scope=flori-test-worker
      - name: Run selected external validation
        env:
          INTEGRATION_ARTIFACT_DIR: ${{ runner.temp }}/flori-external-artifacts
        run: bash scripts/test.sh --external "${{ inputs.scenario }}"
      - name: Upload external JUnit
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: external-${{ inputs.scenario }}-junit
          path: ${{ runner.temp }}/flori-external-artifacts/*.xml
          if-no-files-found: warn
