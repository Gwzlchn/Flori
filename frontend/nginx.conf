server {
    listen 80;
    server_name _;

    # API + WebSocket 反代。用 docker 内置 DNS + 变量延迟解析 upstream，
    # 这样 api 不在同网络时(如 ECS 边缘只跑前端，/api 由 Caddy 接管)nginx
    # 仍能启动，而不是启动期解析不到 api 就退出。
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $api_host api;
        proxy_pass http://$api_host:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Static assets with cache
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        # index.html(及所有 SPA 路由回退)必须 no-cache:它引用带哈希的 /assets/*(上面 immutable 缓存)。
        # 若 index.html 被缓存,前端镜像一更新(资源哈希变),浏览器仍用旧 index → 引用已删的旧 assets
        # → 404 → 页面崩坏(用户感知"莫名其妙回退/好设计丢了")。no-cache=每次带 ETag 重验,未变 304 仍高效。
        add_header Cache-Control "no-cache";
    }
}
