video:
  steps:
    - name: "01_download"
      module: steps.common.step_01_download
      pool: io
      depends_on: []
      timeout_sec: 600
      retries: 3

    - name: "02_whisper"
      module: steps.video.step_02_whisper
      pool: gpu
      depends_on: ["01_download"]
      condition: "no_subtitle"
      timeout_sec: 1800
      retries: 2
      tags: ["gpu"]

    - name: "03_scene"
      module: steps.video.step_03_scene
      pool: scene
      depends_on: ["01_download"]
      timeout_sec: 600
      retries: 2

    - name: "04_frames"
      module: steps.video.step_04_frames
      pool: cpu
      depends_on: ["03_scene"]
      timeout_sec: 120
      retries: 1

    - name: "05_dedup"
      module: steps.video.step_05_dedup
      pool: cpu
      depends_on: ["04_frames"]
      timeout_sec: 120
      retries: 1

    - name: "06_ocr"
      module: steps.video.step_06_ocr
      pool: cpu
      depends_on: ["05_dedup"]
      timeout_sec: 300
      retries: 2

    - name: "07_danmaku"
      module: steps.video.step_07_danmaku
      pool: io
      depends_on: ["01_download"]
      condition: "has_danmaku"
      timeout_sec: 30
      retries: 1

    - name: "08_punctuate"
      module: steps.video.step_08_punctuate
      pool: ai
      depends_on: ["01_download"]
      condition: "has_subtitle"
      timeout_sec: 300
      retries: 3
      tags: []
      ai:
        primary: {provider: kimi, model: moonshot-v1-8k}
        fallback: {provider: kimi, model: moonshot-v1-32k}

    - name: "09_mechanical"
      module: steps.video.step_09_mechanical
      pool: io
      depends_on: ["06_ocr", "07_danmaku", "08_punctuate"]
      timeout_sec: 30
      retries: 1

    - name: "10_smart"
      module: steps.video.step_10_smart
      pool: ai
      depends_on: ["09_mechanical"]
      timeout_sec: 600
      retries: 2
      tags: ["vision"]
      ai:
        primary: {provider: kimi, model: moonshot-v1-32k}
        fallback: {provider: kimi, model: moonshot-v1-128k}
        text_fallback: {provider: kimi, model: moonshot-v1-32k}

    - name: "11_review"
      module: steps.video.step_11_review
      pool: ai
      depends_on: ["10_smart"]
      timeout_sec: 120
      retries: 2
      tags: []
      ai:
        primary: {provider: kimi, model: moonshot-v1-8k}
        fallback: {provider: kimi, model: moonshot-v1-32k}

paper:
  steps:
    - name: "01_download"
      module: steps.common.step_01_download
      pool: io
      depends_on: []
      timeout_sec: 300
      retries: 3

    - name: "02_pdf_parse"
      module: steps.paper.step_02_pdf_parse
      pool: cpu
      depends_on: ["01_download"]
      timeout_sec: 120
      retries: 1

    - name: "03_sections"
      module: steps.paper.step_03_sections
      pool: cpu
      depends_on: ["02_pdf_parse"]
      timeout_sec: 60
      retries: 1

    - name: "04_figures"
      module: steps.paper.step_04_figures
      pool: cpu
      depends_on: ["02_pdf_parse"]
      timeout_sec: 120
      retries: 1

    - name: "05_smart_paper"
      module: steps.paper.step_05_smart_paper
      pool: ai
      depends_on: ["03_sections", "04_figures"]
      timeout_sec: 600
      retries: 2
      tags: []
      ai:
        primary: {provider: kimi, model: moonshot-v1-32k}
        fallback: {provider: kimi, model: moonshot-v1-128k}

    - name: "06_review"
      module: steps.paper.step_06_review
      pool: ai
      depends_on: ["05_smart_paper"]
      timeout_sec: 120
      retries: 2
      tags: []
      ai:
        primary: {provider: kimi, model: moonshot-v1-8k}
        fallback: {provider: kimi, model: moonshot-v1-32k}
