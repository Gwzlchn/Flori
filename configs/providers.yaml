# provider 池。pipelines.yaml 默认链只用 claude-cli/anthropic/deepseek;
# kimi/openai/local 不在默认链,仅供前端「选 provider 重跑」手动挑选(按是否配 key 标灰),
# 经 ai_gateway 按 type 分发动态使用——非死配置,勿删。
providers:
  anthropic:
    type: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    models:
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
    features: [vision, batch, caching]

  deepseek:
    type: openai_compatible
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    models:
      - deepseek-v4-pro
      - deepseek-v4-flash
    features: []

  openai:
    type: openai
    api_key: ${OPENAI_API_KEY:-}
    models:
      - gpt-4o
      - gpt-4o-mini
    features: [vision]

  claude-cli:
    type: cli
    # prompt 经 stdin 喂入;有帧图时 provider 动态追加 --allowedTools Read --add-dir。
    # 输出格式由 provider 强制 `--output-format json`(取真实 usage/cache/total_cost_usd/num_turns);
    # 这里不写 --output-format(写了也会被 provider 剔除改 json)。
    command: ["claude", "-p"]
    features: [vision]
    cost_usd: 0

  kimi:
    type: openai_compatible
    base_url: https://api.moonshot.cn/v1
    api_key: ${KIMI_API_KEY}
    models:
      - moonshot-v1-8k
      - moonshot-v1-32k
      - moonshot-v1-128k
    features: []

  local:
    type: openai_compatible
    base_url: http://ollama:11434/v1
    api_key: ollama
    models:
      - "qwen3:7b"
      - "qwen3:32b"
    features: []
    cost_usd: 0
