# provider 池。pipelines.yaml 默认链主用 claude-cli;
# kimi/openai/local 不在默认链,仅供前端选 provider 重跑时手动挑选(按是否配 key 标灰),
# 经 ai_gateway 按 type 分发动态使用——非死配置,勿删。
providers:
  anthropic:
    type: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    models:
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
    features: [vision, batch, caching]

  deepseek:
    type: openai_compatible
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    models:
      - deepseek-v4-pro
      - deepseek-v4-flash
    features: []

  openai:
    type: openai
    api_key: ${OPENAI_API_KEY:-}
    models:
      - gpt-4o
      - gpt-4o-mini
    features: [vision]

  claude-cli:
    type: cli
    # prompt 经 stdin 喂入;有帧图时 provider 动态追加 --allowedTools Read --add-dir。
    # 输出格式由 provider 强制 `--output-format json`(取真实 usage/cache/total_cost_usd/num_turns);
    # 这里不写 --output-format(写了也会被 provider 剔除改 json)。
    command: ["claude", "-p"]
    # 默认模型(yaml 单一来源,钉死可复现):不配则沿用挂载 HOME 里 CLI 自己的默认模型。
    # 优先级:pipelines.yaml 步级 model > 此默认 > CLI 默认。换模型会变 def_digest。
    # [1m] 后缀 = 1M 上下文。
    model: "claude-opus-4-8[1m]"
    features: [vision]
    cost_usd: 0

  codex-cli:
    type: codex_cli
    # prompt 经 stdin 喂入;provider 动态追加 --json/-o/--sandbox read-only/--image.
    # 首版只承诺纯文本/图片,不映射 Claude 的 Read/WebSearch/Bash allowed_tools 语义.
    command: ["codex", "exec"]
    # Codex CLI 接入方式也必须显式指定模型,避免跟随本机 CLI 默认值漂移。
    model: gpt-5-codex
    features: [vision]
    cost_usd: 0

  kimi:
    type: openai_compatible
    base_url: https://api.moonshot.cn/v1
    api_key: ${KIMI_API_KEY}
    models:
      - moonshot-v1-8k
      - moonshot-v1-32k
      - moonshot-v1-128k
    features: []

  local:
    type: openai_compatible
    base_url: http://ollama:11434/v1
    api_key: ollama
    models:
      - "qwen3:7b"
      - "qwen3:32b"
    features: []
    cost_usd: 0
