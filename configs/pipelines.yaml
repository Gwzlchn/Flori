# GitLab-CI 风格流水线:变量/模板(extends)/needs/rules 在加载时归一化为内部 step 结构。
# 顺序由 needs 决定;prod 与 integration 的差异退化为 integration 文件里一份 variables 覆盖。
#
# 约定:
#   - 步骤键按执行顺序从 01 递增(每条 pipeline 各自从 01 开始)。
#   - label:  步骤中文显示名(前端各处展示)。英文键只在日志/技术视图出现。
#   - outputs: 本步产物的文件 glob(单一事实源)。前端「步骤与产物」面板按此分组展示,
#              未被任何步骤匹配的文件不进分组视图。job.json 等敏感文件由代码强制隐藏。

# 全局默认:所有 job 自动继承、可逐字段覆盖。
default:
  image: flori/step-base
  timeout: 600
  retry: 0
  # 步骤定义版本,进 step def_digest 指纹。改某步行为(如改了内联 prompt/换实现)却想触发重跑时,
  # 在该步下加/改 `version: "2"` 即可,无需改代码。换 ai 模型也会自动触发。详见 shared/step_base._def_digest。
  version: "1"

# 三类 pipeline 共用的 AI 角色变量.22 个键各定义一次,route 只引用,不在内容类型内重抄.
variables:
  AI_CONCEPTS_PRIMARY_PROVIDER: claude-cli
  AI_CONCEPTS_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_CONCEPTS_FALLBACK_PROVIDER: claude-cli
  AI_CONCEPTS_FALLBACK_MODEL: "claude-opus-4-8[1m]"
  AI_SMART_PRIMARY_PROVIDER: claude-cli
  AI_SMART_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_SMART_FALLBACK_PROVIDER: claude-cli
  AI_SMART_FALLBACK_MODEL: "claude-opus-4-8[1m]"
  AI_SMART_TEXT_PROVIDER: claude-cli
  AI_SMART_TEXT_MODEL: "claude-opus-4-8[1m]"
  AI_REVIEW_PRIMARY_PROVIDER: claude-cli
  AI_REVIEW_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_REVIEW_FALLBACK_PROVIDER: claude-cli
  AI_REVIEW_FALLBACK_MODEL: "claude-opus-4-8[1m]"
  AI_PUNCT_PRIMARY_PROVIDER: claude-cli
  AI_PUNCT_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_PUNCT_FALLBACK_PROVIDER: claude-cli
  AI_PUNCT_FALLBACK_MODEL: "claude-opus-4-8[1m]"
  AI_TRANSLATE_PRIMARY_PROVIDER: claude-cli
  AI_TRANSLATE_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_TRANSLATE_FALLBACK_PROVIDER: claude-cli
  AI_TRANSLATE_FALLBACK_MODEL: "claude-opus-4-8[1m]"

# 隐藏模板('.' 前缀,不直接运行):同类步只写差异,extends 按键深合并。
.cpu-step:
  pool: cpu
  timeout: 120
  retry: 1

.ai-step:
  pool: ai
  timeout: 600
  # 5 次:让限流(ai_rate_limit)长退避策略 [300,600,1200,1800,1800] 跑满,耐心等配额恢复;
  # 普通 ai 错误仍按其策略上限 3 退避,互不影响:调度取 min(policy_max, retry)。
  retry: 5

.review:
  pool: ai
  timeout: 120
  retry: 5

video:
  variables:
    OCR_TIMEOUT: 1800
    OCR_RETRIES: 1
  jobs:
    "01_download":
      label: "下载"
      scope: part
      run: steps.common.step_01_download
      pool: io
      retry: 3
      timeout: 2400   # 长视频(30min+)1080p 下载 + 推 MinIO 可能超默认 600s
      outputs: ["input/source.mp4", "input/source.mp3", "input/source.m4a",
                "input/metadata.json", "input/*.srt", "input/*.ass",
                "input/source.pdf", "input/source.html"]

    "02_whisper":
      label: "语音转写"
      scope: part
      run: steps.video.step_02_whisper
      image: flori/step-gpu
      pool: cpu
      needs: ["01_download"]
      timeout: 1800
      retry: 2
      tags: []
      rules:
        - exists: "input/*.srt"
          when: skip
      outputs: ["input/subtitle.srt"]
      # 01_download 可能带回原生字幕(input/*.srt);whisper 只在其缺席时产出,后写者持有。
      output_policy: {overlap_with: ["01_download"]}

    "03_scene":
      label: "场景检测"
      scope: part
      run: steps.video.step_03_scene
      image: flori/step-heavy
      pool: cpu
      needs: ["01_download"]
      # AdaptiveDetector 逐帧扫描,长视频需要随时长放大执行窗口。短于 50 分钟仍使用 600 秒基线。
      timeout: 600
      timeout_per_min: 12
      timeout_max_sec: 7200
      retry: 2
      outputs: ["intermediate/scenes.json"]

    "04_frames":
      label: "关键帧"
      scope: part
      extends: .cpu-step
      run: steps.video.step_04_frames
      image: flori/step-heavy
      needs: ["03_scene"]
      timeout: 1800   # cv2 逐场景 SSIM 代表帧:长视频(数百场景)耗时,远超 .cpu-step 的 120s
      outputs: ["intermediate/candidates.json", "assets/*"]

    "05_dedup":
      label: "画面去重"
      scope: part
      extends: .cpu-step
      run: steps.video.step_05_dedup
      image: flori/step-heavy
      needs: ["04_frames"]
      timeout: 900    # 数百帧 pHash + 灰区 SSIM 复核
      outputs: ["intermediate/dedup.json"]

    "06_ocr":
      label: "画面文字(OCR)"
      scope: part
      extends: .cpu-step
      run: steps.video.step_06_ocr
      version: "2"
      image: flori/step-heavy
      needs: ["05_dedup"]
      timeout: $OCR_TIMEOUT
      retry: $OCR_RETRIES
      outputs: ["intermediate/ocr.json"]

    "07_danmaku":
      label: "弹幕"
      scope: part
      run: steps.video.step_07_danmaku
      pool: io
      needs: ["01_download"]
      timeout: 30
      retry: 1
      rules:
        - exists: "input/*.ass"
          when: on
      outputs: ["intermediate/danmaku.json"]

    "08_punctuate":
      label: "口播稿"
      scope: part
      extends: .ai-step
      run: steps.video.step_08_punctuate
      version: "4"
      # 依赖 whisper 与 OCR:来源清单必须一次绑定字幕段和真实帧,不能在 OCR 前提前发布.
      # (whisper 有原生 srt 则 skip,视为满足依赖)。否则规则在 whisper 前求值,彼时无 srt,
      # 本步被跳过,笔记只剩 OCR。规则保留作兜底(whisper 万一没产 srt 则优雅跳过)。
      needs: ["01_download", "02_whisper", "06_ocr"]
      timeout: 1800
      retry: 5
      tags: []
      rules:
        - exists: "input/*.srt"
          when: on
      ai:
        primary: {provider: $AI_PUNCT_PRIMARY_PROVIDER, model: $AI_PUNCT_PRIMARY_MODEL}
        fallback: {provider: $AI_PUNCT_FALLBACK_PROVIDER, model: $AI_PUNCT_FALLBACK_MODEL}
      outputs: ["output/transcript.md", "intermediate/source_segments.json", "output/provenance/transcript.json"]

    "09_merge_parts":
      label: "合并分段"
      run: steps.video.step_09_merge_parts
      pool: io
      scope: job
      fan_in: ["07_danmaku", "08_punctuate"]
      timeout: 120
      retry: 1
      on_complete:
        - action: sync_metadata
      outputs: ["output/transcript.md", "intermediate/source_segments.json",
                "intermediate/dedup.json", "intermediate/ocr.json", "intermediate/danmaku.json",
                "output/provenance/transcript.json"]

    "09_mechanical":
      label: "机械版笔记"
      run: steps.video.step_09_mechanical
      version: "2"
      pool: io
      # 依赖 08:口播稿(标点版,源自原生字幕或 whisper 转写)必须先就绪再出机械版。否则无字幕视频
      # (如 YouTube 无 CC)只会得到纯 OCR 笔记、丢失口播主体内容。08 有 retry:5 容错。
      needs: ["09_merge_parts"]
      timeout: 30
      retry: 1
      on_complete:
        - action: index_note
          candidates:
            - {note_type: mechanical, path: "output/notes_mechanical.md", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/mechanical.json", provenance_step: "09_mechanical", provenance_since_version: "2"}
      outputs: ["output/notes_mechanical.md", "output/provenance/mechanical.json"]

    "10_evidence":
      label: "权威来源"
      extends: .ai-step
      run: steps.video.step_evidence
      version: "2"
      # 案例取证,理由见 ADR-0012。仅案例类(domain=finance / style_tags 含 case-study)触发,步内自门控。
      # 其余写空 skip,秒返回不挡 smart。在 smart 之前跑——11_smart 依赖它以引 [E#] 一手来源。
      needs: ["09_mechanical"]
      tags: []
      timeout: 1800   # Claude 只搜索候选,正文由服务端受控下载并校验
      retry: 1        # 外网/反爬易抖,不像评审那样 5 次硬刚
      # 取证固定用 Claude CLI 显式模型;换模型会变 def_digest → 步自动过期可重跑。
      ai:
        primary: {provider: claude-cli, model: "claude-opus-4-8[1m]"}
        fallback: {provider: claude-cli, model: "claude-opus-4-8[1m]"}
      outputs: ["output/evidence.json", "output/evidence/*"]

    "11_smart":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.video.step_11_smart
      version: "5"
      # 依赖取证:案例类笔记据 evidence.json 引 [E#] 一手来源(非案例类 10_evidence 秒 skip,不挡)。
      needs: ["09_mechanical", "10_evidence"]
      tags: ["vision"]
      timeout: 1800   # claude-cli 逐张 Read 帧图(最多 20+ 张),与 provider 超时上限对齐
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
        text_fallback: {provider: $AI_SMART_TEXT_PROVIDER, model: $AI_SMART_TEXT_MODEL}
      outputs: ["output/versions/notes_smart_*", "output/provenance/smart.json", "output/provenance_candidates/smart.json"]

    "12_concepts":
      label: "概念 + 摘要"
      extends: .ai-step
      run: steps.common.step_concepts
      prompt_template: 05_concepts
      version: "5"
      # 统一概念步:视频以最新版智能笔记为源(必有,11_smart 必跑)。
      needs: ["11_semantic_attestation"]
      timeout: 120
      tags: []
      ai:
        primary: {provider: $AI_CONCEPTS_PRIMARY_PROVIDER, model: $AI_CONCEPTS_PRIMARY_MODEL}
        fallback: {provider: $AI_CONCEPTS_FALLBACK_PROVIDER, model: $AI_CONCEPTS_FALLBACK_MODEL}
      on_complete:
        - action: index_note
          candidates:
            - {note_type: smart, path: "output/versions/notes_smart_*", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/smart.json", provenance_step: "11_semantic_attestation", provenance_since_version: "2", legacy_provenance_step: "11_smart", legacy_provenance_since_version: "3"}
        - action: collect_glossary
      outputs: ["output/concepts.json"]

    "11_semantic_attestation":
      label: "语义证据独立核验"
      extends: .ai-step
      run: steps.utils.step_semantic_attestation
      version: "2"
      needs: ["11_smart"]
      timeout: 180
      tags: []
      # 协议 prompt:tracked 模板可读,prompt_locked 禁前端覆盖(响应 schema 与解析器成对,改模板须 bump version)。
      prompt_template: semantic_attestation
      prompt_locked: true
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      # 核验步以最终版覆盖 11_smart 先写的 provenance/smart.json,后写者持有(§2.5)。
      output_policy: {overlap_with: ["11_smart"]}
      outputs: ["output/provenance/smart.json", "output/provenance/semantic_batch.json"]

    "12_review":
      label: "评审"
      extends: .review
      run: steps.video.step_12_review
      version: "2"
      # 评最新版智能笔记;并读 evidence.json 核 [E#] 忠实性(经传递性排在取证之后)。
      needs: ["12_concepts"]
      tags: []
      timeout: 1800   # claude-cli 对大 prompt(笔记+机械稿)生成评审较慢,给足时间
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      on_complete:
        - action: collect_glossary
      outputs: ["output/review.json", "output/review_input.md", "output/review_sources/*", "output/versions/review_*", "output/versions/review_input_*"]

document:
  # 所有文档共用 DAG；document_kind 决定 Prompt profile，source_profile 决定解析 adapter。
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      timeout: 600   # PDF + HTML 源 + 页内图片(arxiv 慢时单 PDF 可近 120s)
      retry: 3
      version: "5"   # 图 urljoin 去手拼尾斜杠(RFC3986 末段丢弃=浏览器语义;修双段404图全外链),失效旧指纹
      on_complete:
        - action: sync_metadata
      outputs: ["input/source.pdf", "input/source.html", "input/metadata.json", "assets/*"]

    "02_parse":
      label: "结构化解析"
      extends: .cpu-step
      run: steps.document.step_02_parse
      image: flori/step-heavy
      needs: ["01_download"]
      version: "4"
      timeout: 1800
      on_complete:
        - action: sync_metadata
      outputs: ["intermediate/document.json", "intermediate/quality.json", "intermediate/source_segments.json", "intermediate/needs_translation.json", "assets/*"]
      # 解析补写页内图片(assets/*),与 01_download 带回的资产同域,后写者持有。
      output_policy: {overlap_with: ["01_download"]}

    "03_structure":
      label: "结构验收"
      extends: .cpu-step
      run: steps.document.step_03_structure
      needs: ["02_parse"]
      timeout: 60
      version: "1"
      on_complete:
        - action: index_note
          candidates:
            - {note_type: original, path: "intermediate/document_index.md", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/original.json", provenance_step: "03_structure", provenance_since_version: "1"}
      outputs: ["intermediate/document.json", "intermediate/quality.json", "intermediate/source_segments.json", "intermediate/document_index.md", "output/provenance/original.json"]
      # 结构验收在 02_parse 的结构中间产物上原位修订,后写者持有。
      output_policy: {overlap_with: ["02_parse"]}

    "04_translate":
      label: "翻译"
      extends: .ai-step
      run: steps.document.step_04_translate
      prompt_template: 04_translate_document
      needs: ["03_structure"]
      version: "1"
      timeout: 7200
      tags: []
      rules:
        - exists: "intermediate/needs_translation.json"
          when: on
        - when: skip
      ai:
        primary: {provider: $AI_TRANSLATE_PRIMARY_PROVIDER, model: $AI_TRANSLATE_PRIMARY_MODEL}
        fallback: {provider: $AI_TRANSLATE_FALLBACK_PROVIDER, model: $AI_TRANSLATE_FALLBACK_MODEL}
      on_complete:
        - action: collect_term_pairs
      outputs: ["output/translation.json", "output/translated.html", "output/provenance/translated.json", "output/provenance_candidates/translated.json"]

    "05_smart":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.document.step_05_smart
      prompt_template: 05_smart_document
      version: "1"
      needs: ["03_structure", "04_translate"]
      tags: []
      rules:
        - if_flag: smart_note
          when: on
        - when: skip
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      outputs: ["output/versions/notes_smart_*", "output/provenance/smart.json", "output/provenance_candidates/smart.json"]

    "07_concepts":
      label: "概念 + 摘要"
      extends: .ai-step
      run: steps.document.step_07_concepts
      prompt_template: 05_concepts
      version: "1"
      needs: ["06_semantic_attestation"]
      timeout: 120
      tags: []
      ai:
        primary: {provider: $AI_CONCEPTS_PRIMARY_PROVIDER, model: $AI_CONCEPTS_PRIMARY_MODEL}
        fallback: {provider: $AI_CONCEPTS_FALLBACK_PROVIDER, model: $AI_CONCEPTS_FALLBACK_MODEL}
      on_complete:
        - action: index_note
          candidates:
            - {note_type: smart, path: "output/versions/notes_smart_*", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/smart.json", provenance_step: "06_semantic_attestation", provenance_since_version: "1"}
            - {note_type: translated, path: "output/translated.html", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/translated.json", provenance_step: "06_semantic_attestation", provenance_since_version: "1"}
            - {note_type: original, path: "intermediate/document_index.md", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/original.json", provenance_step: "03_structure", provenance_since_version: "1"}
        - action: collect_glossary
      outputs: ["output/concepts.json"]

    "06_semantic_attestation":
      label: "语义证据独立核验"
      extends: .ai-step
      run: steps.utils.step_semantic_attestation
      version: "1"
      needs: ["05_smart", "04_translate"]
      timeout: 180
      tags: []
      prompt_template: semantic_attestation
      prompt_locked: true
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      # 核验步以最终版覆盖 05_smart/04_translate 先写的 provenance,后写者持有(§2.5)。
      output_policy: {overlap_with: ["05_smart", "04_translate"]}
      outputs: ["output/provenance/smart.json", "output/provenance/translated.json", "output/provenance/semantic_batch.json"]

    "08_review":
      label: "评审"
      extends: .review
      run: steps.document.step_08_review
      version: "1"
      needs: ["07_concepts"]
      tags: []
      rules:
        - if_flag: smart_note
          when: on
        - when: skip
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      on_complete:
        - action: collect_glossary
      outputs: ["output/review.json", "output/review_input.md", "output/review_sources/*", "output/versions/review_*", "output/versions/review_input_*"]

audio:
  # provider 统一 claude-cli + 显式模型,由带 claude-cli tag 的 ai worker 认领。
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      timeout: 120
      retry: 3
      on_complete:
        - action: sync_metadata
      outputs: ["input/source.mp3", "input/source.m4a", "input/source.mp4", "input/metadata.json"]

    # 转写复用 video 的 whisper 步。
    "02_whisper":
      label: "语音转写"
      run: steps.video.step_02_whisper
      image: flori/step-gpu
      # 对齐 video 的 whisper:cpu-pool + 无 tag → 任意 cpu worker 可跑(faster-whisper CPU int8);
      # worker 有 GPU 时 select_whisper_model 自动用 GPU。刻意不配 gpu 池:无 GPU worker 时任务会无人认领卡死。
      pool: cpu
      needs: ["01_download"]
      timeout: 1800
      # 超时随音频时长伸缩:无 GPU 时 CPU base int8 跑长集约 1.3x 实时,固定 1800s 会把长集硬杀。
      # worker 跑步前读 input/metadata.json 的 duration_sec,有效超时 = clamp(max(1800, ceil(分钟)*90), 21600)。
      # 缺 metadata/duration 时退回固定 timeout。机制通用,见 shared.config.build_step_config / worker。
      timeout_per_min: 90
      timeout_max_sec: 21600
      retry: 2
      tags: []
      outputs: ["input/subtitle.srt"]

    "03_transcript_parse":
      label: "转写解析"
      extends: .cpu-step
      run: steps.audio.step_03_transcript_parse
      version: "3"
      needs: ["02_whisper"]
      timeout: 60
      outputs: ["intermediate/transcript.json", "output/transcript.md", "intermediate/segments.json", "intermediate/source_segments.json", "output/provenance/transcript.json"]

    "04_smart_podcast":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.audio.step_04_smart_podcast
      version: "4"
      needs: ["03_transcript_parse"]
      tags: []
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      outputs: ["output/versions/notes_smart_*", "output/provenance/smart.json", "output/provenance_candidates/smart.json"]

    "05_concepts":
      label: "概念 + 摘要"
      extends: .ai-step
      run: steps.common.step_concepts
      version: "5"
      # 统一概念步:播客以智能笔记为源。
      needs: ["04_semantic_attestation"]
      timeout: 120
      tags: []
      ai:
        primary: {provider: $AI_CONCEPTS_PRIMARY_PROVIDER, model: $AI_CONCEPTS_PRIMARY_MODEL}
        fallback: {provider: $AI_CONCEPTS_FALLBACK_PROVIDER, model: $AI_CONCEPTS_FALLBACK_MODEL}
      on_complete:
        - action: index_note
          candidates:
            - {note_type: smart, path: "output/versions/notes_smart_*", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/smart.json", provenance_step: "04_semantic_attestation", provenance_since_version: "2", legacy_provenance_step: "04_smart_podcast", legacy_provenance_since_version: "2"}
        - action: collect_glossary
      outputs: ["output/concepts.json"]

    "04_semantic_attestation":
      label: "语义证据独立核验"
      extends: .ai-step
      run: steps.utils.step_semantic_attestation
      version: "2"
      needs: ["04_smart_podcast"]
      timeout: 180
      tags: []
      prompt_template: semantic_attestation
      prompt_locked: true
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      # 核验步以最终版覆盖 04_smart_podcast 先写的 provenance/smart.json,后写者持有(§2.5)。
      output_policy: {overlap_with: ["04_smart_podcast"]}
      outputs: ["output/provenance/smart.json", "output/provenance/semantic_batch.json"]

    "05_review":
      label: "评审"
      extends: .review
      run: steps.audio.step_05_review
      version: "2"
      needs: ["05_concepts"]
      tags: []
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      on_complete:
        - action: collect_glossary
      outputs: ["output/review.json", "output/review_input.md", "output/review_sources/*", "output/versions/review_*", "output/versions/review_input_*"]
