video:
  steps:
    - name: "00_download"
      module: steps.common.step_00_download
      image: mnemo/step-base
      pool: io
      depends_on: []
      timeout_sec: 600
      retries: 3

    - name: "00b_whisper"
      module: steps.video.step_00b_whisper
      image: mnemo/step-gpu
      pool: gpu
      depends_on: ["00_download"]
      condition: "no_subtitle"
      timeout_sec: 1800
      retries: 2
      tags: ["gpu"]

    - name: "01_scene"
      module: steps.video.step_01_scene
      image: mnemo/step-media
      pool: scene
      depends_on: ["00_download"]
      timeout_sec: 600
      retries: 2

    - name: "02_frames"
      module: steps.video.step_02_frames
      image: mnemo/step-media
      pool: cpu
      depends_on: ["01_scene"]
      timeout_sec: 120
      retries: 1

    - name: "03_dedup"
      module: steps.video.step_03_dedup
      image: mnemo/step-media
      pool: cpu
      depends_on: ["02_frames"]
      timeout_sec: 120
      retries: 1

    - name: "04_ocr"
      module: steps.video.step_04_ocr
      image: mnemo/step-ocr
      pool: cpu
      depends_on: ["03_dedup"]
      # CPU RapidOCR 逐帧扫描，每帧约 2-3.5s，一段长视频可达数百帧，需大超时。
      timeout_sec: 1800
      # OCR 超时是工作量过大而非瞬时抖动，重试只会重跑全程（无逐帧续跑），故少重试。
      retries: 1

    - name: "05_danmaku"
      module: steps.video.step_05_danmaku
      image: mnemo/step-base
      pool: io
      depends_on: ["00_download"]
      condition: "has_danmaku"
      timeout_sec: 30
      retries: 1

    - name: "06_punctuate"
      module: steps.video.step_06_punctuate
      image: mnemo/step-base
      pool: ai
      depends_on: ["00_download"]
      condition: "has_subtitle"
      timeout_sec: 300
      retries: 3
      tags: []
      ai:
        primary: {provider: deepseek, model: deepseek-v4-flash}
        fallback: {provider: local, model: "qwen3:7b"}

    - name: "07_mechanical"
      module: steps.video.step_07_mechanical
      image: mnemo/step-base
      pool: io
      depends_on: ["04_ocr", "05_danmaku", "06_punctuate"]
      timeout_sec: 30
      retries: 1

    - name: "08_smart"
      module: steps.video.step_08_smart
      image: mnemo/step-base
      pool: ai
      depends_on: ["07_mechanical"]
      timeout_sec: 600
      retries: 2
      tags: ["vision"]
      ai:
        primary: {provider: anthropic, model: claude-sonnet-4-6}
        fallback: {provider: openai, model: gpt-4o}
        text_fallback: {provider: deepseek, model: deepseek-v4-pro}

    - name: "09_review"
      module: steps.video.step_09_review
      image: mnemo/step-base
      pool: ai
      depends_on: ["08_smart"]
      timeout_sec: 120
      retries: 2
      tags: []
      ai:
        primary: {provider: anthropic, model: claude-haiku-4-5}
        fallback: {provider: deepseek, model: deepseek-v4-flash}

paper:
  steps:
    - name: "00_download"
      module: steps.common.step_00_download
      image: mnemo/step-base
      pool: io
      depends_on: []
      timeout_sec: 300
      retries: 3

    - name: "10_pdf_parse"
      module: steps.paper.step_10_pdf_parse
      image: mnemo/step-pdf
      pool: cpu
      depends_on: ["00_download"]
      timeout_sec: 120
      retries: 1

    - name: "11_sections"
      module: steps.paper.step_11_sections
      image: mnemo/step-base
      pool: cpu
      depends_on: ["10_pdf_parse"]
      timeout_sec: 60
      retries: 1

    - name: "12_figures"
      module: steps.paper.step_12_figures
      image: mnemo/step-pdf
      pool: cpu
      depends_on: ["10_pdf_parse"]
      timeout_sec: 120
      retries: 1

    - name: "14_smart_paper"
      module: steps.paper.step_14_smart_paper
      image: mnemo/step-base
      pool: ai
      depends_on: ["11_sections", "12_figures"]
      timeout_sec: 600
      retries: 2
      tags: []
      ai:
        primary: {provider: anthropic, model: claude-sonnet-4-6}
        fallback: {provider: deepseek, model: deepseek-v4-pro}

    - name: "15_review"
      module: steps.paper.step_15_review
      image: mnemo/step-base
      pool: ai
      depends_on: ["14_smart_paper"]
      timeout_sec: 120
      retries: 2
      tags: []
      ai:
        primary: {provider: anthropic, model: claude-haiku-4-5}
        fallback: {provider: deepseek, model: deepseek-v4-flash}
