# GitLab-CI 风格流水线:变量/模板(extends)/needs/rules 在加载时归一化为内部 step 结构。
# 顺序由 needs 决定;prod 与 integration 的差异退化为 integration 文件里一份 variables 覆盖。
#
# 约定:
#   - 步骤键按执行顺序从 01 递增(每条 pipeline 各自从 01 开始)。
#   - label:  步骤中文显示名(前端各处展示)。英文键只在日志/技术视图出现。
#   - outputs: 本步产物的文件 glob(单一事实源)。前端「步骤与产物」面板按此分组展示,
#              未被任何步骤匹配的文件不进分组视图。job.json 等敏感文件由代码强制隐藏。

# 全局默认:所有 job 自动继承、可逐字段覆盖。
default:
  image: flori/step-base
  timeout: 600
  retry: 0
  # 步骤定义版本,进 step def_digest 指纹。改某步行为(如改了内联 prompt/换实现)却想触发重跑时,
  # 在该步下加/改 `version: "2"` 即可,无需改代码。换 ai 模型也会自动触发。详见 shared/step_base._def_digest。
  version: "1"

# 四类 pipeline 共用的 AI 角色变量.22 个键各定义一次,route 只引用,不在内容类型内重抄.
variables:
  AI_CONCEPTS_PRIMARY_PROVIDER: claude-cli
  AI_CONCEPTS_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_CONCEPTS_FALLBACK_PROVIDER: claude-cli
  AI_CONCEPTS_FALLBACK_MODEL: "claude-opus-4-8[1m]"
  AI_SMART_PRIMARY_PROVIDER: claude-cli
  AI_SMART_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_SMART_FALLBACK_PROVIDER: claude-cli
  AI_SMART_FALLBACK_MODEL: "claude-opus-4-8[1m]"
  AI_SMART_TEXT_PROVIDER: claude-cli
  AI_SMART_TEXT_MODEL: "claude-opus-4-8[1m]"
  AI_REVIEW_PRIMARY_PROVIDER: claude-cli
  AI_REVIEW_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_REVIEW_FALLBACK_PROVIDER: claude-cli
  AI_REVIEW_FALLBACK_MODEL: "claude-opus-4-8[1m]"
  AI_PUNCT_PRIMARY_PROVIDER: claude-cli
  AI_PUNCT_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_PUNCT_FALLBACK_PROVIDER: claude-cli
  AI_PUNCT_FALLBACK_MODEL: "claude-opus-4-8[1m]"
  AI_TRANSLATE_PRIMARY_PROVIDER: claude-cli
  AI_TRANSLATE_PRIMARY_MODEL: "claude-opus-4-8[1m]"
  AI_TRANSLATE_FALLBACK_PROVIDER: claude-cli
  AI_TRANSLATE_FALLBACK_MODEL: "claude-opus-4-8[1m]"

# 隐藏模板('.' 前缀,不直接运行):同类步只写差异,extends 按键深合并。
.cpu-step:
  pool: cpu
  timeout: 120
  retry: 1

.ai-step:
  pool: ai
  timeout: 600
  # 5 次:让限流(ai_rate_limit)长退避策略 [300,600,1200,1800,1800] 跑满,耐心等配额恢复;
  # 普通 ai 错误仍按其策略上限 3 退避,互不影响:调度取 min(policy_max, retry)。
  retry: 5

.review:
  pool: ai
  timeout: 120
  retry: 5

video:
  variables:
    OCR_TIMEOUT: 1800
    OCR_RETRIES: 1
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      retry: 3
      timeout: 2400   # 长视频(30min+)1080p 下载 + 推 MinIO 可能超默认 600s
      on_complete:
        - action: sync_metadata
      outputs: ["input/source.mp4", "input/source.mp3", "input/source.m4a",
                "input/metadata.json", "input/*.srt", "input/*.ass",
                "input/source.pdf", "input/source.html"]

    "02_whisper":
      label: "语音转写"
      run: steps.video.step_02_whisper
      image: flori/step-gpu
      pool: cpu
      needs: ["01_download"]
      timeout: 1800
      retry: 2
      tags: []
      rules:
        - exists: "input/*.srt"
          when: skip
      outputs: ["input/subtitle.srt"]

    "03_scene":
      label: "场景检测"
      run: steps.video.step_03_scene
      image: flori/step-heavy
      pool: cpu
      needs: ["01_download"]
      retry: 2
      outputs: ["intermediate/scenes.json"]

    "04_frames":
      label: "关键帧"
      extends: .cpu-step
      run: steps.video.step_04_frames
      image: flori/step-heavy
      needs: ["03_scene"]
      timeout: 1800   # cv2 逐场景 SSIM 代表帧:长视频(数百场景)耗时,远超 .cpu-step 的 120s
      outputs: ["intermediate/candidates.json", "assets/*"]

    "05_dedup":
      label: "画面去重"
      extends: .cpu-step
      run: steps.video.step_05_dedup
      image: flori/step-heavy
      needs: ["04_frames"]
      timeout: 900    # 数百帧 pHash + 灰区 SSIM 复核
      outputs: ["intermediate/dedup.json"]

    "06_ocr":
      label: "画面文字(OCR)"
      extends: .cpu-step
      run: steps.video.step_06_ocr
      version: "2"
      image: flori/step-heavy
      needs: ["05_dedup"]
      timeout: $OCR_TIMEOUT
      retry: $OCR_RETRIES
      outputs: ["intermediate/ocr.json"]

    "07_danmaku":
      label: "弹幕"
      run: steps.video.step_07_danmaku
      pool: io
      needs: ["01_download"]
      timeout: 30
      retry: 1
      rules:
        - exists: "input/*.ass"
          when: on
      outputs: ["intermediate/danmaku.json"]

    "08_punctuate":
      label: "口播稿"
      extends: .ai-step
      run: steps.video.step_08_punctuate
      version: "4"
      # 依赖 whisper 与 OCR:来源清单必须一次绑定字幕段和真实帧,不能在 OCR 前提前发布.
      # (whisper 有原生 srt 则 skip,视为满足依赖)。否则规则在 whisper 前求值,彼时无 srt,
      # 本步被跳过,笔记只剩 OCR。规则保留作兜底(whisper 万一没产 srt 则优雅跳过)。
      needs: ["01_download", "02_whisper", "06_ocr"]
      timeout: 1800
      retry: 5
      tags: []
      rules:
        - exists: "input/*.srt"
          when: on
      ai:
        primary: {provider: $AI_PUNCT_PRIMARY_PROVIDER, model: $AI_PUNCT_PRIMARY_MODEL}
        fallback: {provider: $AI_PUNCT_FALLBACK_PROVIDER, model: $AI_PUNCT_FALLBACK_MODEL}
      outputs: ["output/transcript.md", "intermediate/source_segments.json", "output/provenance/transcript.json"]

    "09_mechanical":
      label: "机械版笔记"
      run: steps.video.step_09_mechanical
      version: "2"
      pool: io
      # 依赖 08:口播稿(标点版,源自原生字幕或 whisper 转写)必须先就绪再出机械版。否则无字幕视频
      # (如 YouTube 无 CC)只会得到纯 OCR 笔记、丢失口播主体内容。08 有 retry:5 容错。
      needs: ["06_ocr", "07_danmaku", "08_punctuate"]
      timeout: 30
      retry: 1
      on_complete:
        - action: index_note
          candidates:
            - {note_type: mechanical, path: "output/notes_mechanical.md", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/mechanical.json", provenance_step: "09_mechanical", provenance_since_version: "2"}
      outputs: ["output/notes_mechanical.md", "output/provenance/mechanical.json"]

    "10_evidence":
      label: "权威来源"
      extends: .ai-step
      run: steps.video.step_evidence
      version: "2"
      # 案例取证,理由见 ADR-0012。仅案例类(domain=finance / style_tags 含 case-study)触发,步内自门控。
      # 其余写空 skip,秒返回不挡 smart。在 smart 之前跑——11_smart 依赖它以引 [E#] 一手来源。
      needs: ["09_mechanical"]
      tags: []
      timeout: 1800   # Claude 只搜索候选,正文由服务端受控下载并校验
      retry: 1        # 外网/反爬易抖,不像评审那样 5 次硬刚
      # 取证固定用 Claude CLI 显式模型;换模型会变 def_digest → 步自动过期可重跑。
      ai:
        primary: {provider: claude-cli, model: "claude-opus-4-8[1m]"}
        fallback: {provider: claude-cli, model: "claude-opus-4-8[1m]"}
      outputs: ["output/evidence.json", "output/evidence/*"]

    "11_smart":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.video.step_11_smart
      version: "4"
      # 依赖取证:案例类笔记据 evidence.json 引 [E#] 一手来源(非案例类 10_evidence 秒 skip,不挡)。
      needs: ["09_mechanical", "10_evidence"]
      tags: ["vision"]
      timeout: 1800   # claude-cli 逐张 Read 帧图(最多 20+ 张),与 provider 超时上限对齐
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
        text_fallback: {provider: $AI_SMART_TEXT_PROVIDER, model: $AI_SMART_TEXT_MODEL}
      outputs: ["output/versions/notes_smart_*", "output/provenance/smart.json"]

    "12_concepts":
      label: "概念 + 摘要"
      extends: .ai-step
      run: steps.article.step_05_concepts
      prompt_template: 05_concepts
      version: "4"
      # 复用 article 概念步:视频以最新版智能笔记为源(必有,11_smart 必跑)。
      needs: ["11_smart"]
      timeout: 120
      tags: []
      ai:
        primary: {provider: $AI_CONCEPTS_PRIMARY_PROVIDER, model: $AI_CONCEPTS_PRIMARY_MODEL}
        fallback: {provider: $AI_CONCEPTS_FALLBACK_PROVIDER, model: $AI_CONCEPTS_FALLBACK_MODEL}
      on_complete:
        - action: index_note
          candidates:
            - {note_type: smart, path: "output/versions/notes_smart_*", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/smart.json", provenance_step: "11_smart", provenance_since_version: "3"}
        - action: collect_glossary
      outputs: ["output/concepts.json"]

    "12_review":
      label: "评审"
      extends: .review
      run: steps.video.step_12_review
      version: "2"
      # 评最新版智能笔记;并读 evidence.json 核 [E#] 忠实性(经传递性排在取证之后)。
      needs: ["12_concepts"]
      tags: []
      timeout: 1800   # claude-cli 对大 prompt(笔记+机械稿)生成评审较慢,给足时间
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      on_complete:
        - action: collect_glossary
      outputs: ["output/review.json", "output/review_input.md", "output/review_sources/*", "output/versions/review_*", "output/versions/review_input_*"]

paper:
  # provider 统一 claude-cli + 显式模型,由带 claude-cli tag 的 ai worker 认领。
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      timeout: 600   # PDF + HTML 源 + 页内图片(arxiv 慢时单 PDF 可近 120s)
      retry: 3
      version: "5"   # 图 urljoin 去手拼尾斜杠(RFC3986 末段丢弃=浏览器语义;修双段404图全外链),失效旧指纹
      on_complete:
        - action: sync_metadata
      outputs: ["input/source.pdf", "input/source.html", "input/metadata.json", "assets/*"]

    "02_pdf_parse":
      # 步名保留 "02_pdf_parse"(历史 job 步身份/重跑兼容),语义已是「论文解析(HTML 优先)」。
      label: "解析"
      extends: .cpu-step
      run: steps.paper.step_02_pdf_parse
      needs: ["01_download"]
      # 解析语义含首页标题修复与 provenance v2 support identity,旧 done 必须失效.
      version: "5"
      # 非中文论文写 needs_translation.json 标记(供 04_translate_paper 的 rules:exists 门控)。
      on_complete:
        - action: sync_metadata
      outputs: ["intermediate/parsed.json", "intermediate/needs_translation.json", "intermediate/source_segments.json", "intermediate/pdf_page_support.json", "output/original.md", "output/provenance/original.json"]

    "03_sections":
      label: "章节切分"
      extends: .cpu-step
      run: steps.paper.step_03_sections
      needs: ["02_pdf_parse"]
      timeout: 60
      version: "3"   # original.md 让位 02(arxiv-html 干净版),仅文本解析兜底时才由本步渲染
      outputs: ["intermediate/sections.json"]

    "04_translate_paper":
      label: "翻译"
      extends: .ai-step
      run: steps.paper.step_04_translate_paper
      needs: ["03_sections"]
      version: "7"   # 术语一致性:chunk 注入 term_map + 回收 term_pairs(工单 26-07-06/04),失效旧指纹
      # 大论文多 chunk 串行翻译,步墙钟须覆盖全部 chunk(~15 块 × 2-4min);600 默认必超时。
      timeout: 7200
      tags: []
      capability_rules:
        read:
          unless_any_nonempty: ["output/original.md"]
      # 仅非中文论文触发:02_pdf_parse 写了 needs_translation.json 才跑,中文论文跳过。
      rules:
        - exists: "intermediate/needs_translation.json"
          when: on
        - when: skip
      ai:
        primary: {provider: $AI_TRANSLATE_PRIMARY_PROVIDER, model: $AI_TRANSLATE_PRIMARY_MODEL}
        fallback: {provider: $AI_TRANSLATE_FALLBACK_PROVIDER, model: $AI_TRANSLATE_FALLBACK_MODEL}
      on_complete:
        - action: collect_term_pairs
      outputs: ["output/translated.md", "output/provenance/translated.json"]

    "05_smart_paper":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.paper.step_05_smart_paper
      version: "3"
      # needs 04_translate_paper:非中文论文先翻译,笔记基于译文做(译文跳过=中文论文时依赖视为满足)。
      needs: ["03_sections", "04_translate_paper"]
      tags: []
      capability_rules:
        read:
          unless_any_nonempty: ["output/translated.md", "output/original.md"]
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      outputs: ["output/versions/notes_smart_*", "output/provenance/smart.json"]

    "05_concepts":
      label: "概念 + 摘要"
      extends: .ai-step
      run: steps.article.step_05_concepts
      version: "4"
      # 复用 article 概念步(源优先级:智能笔记 > 译文 > original.md;旧任务才回退章节)。
      # 此前 paper 概念只搭 06_review key_terms 便车(无 zh_name/related),图谱边稀疏的根因。
      needs: ["05_smart_paper"]
      timeout: 120
      tags: []
      ai:
        primary: {provider: $AI_CONCEPTS_PRIMARY_PROVIDER, model: $AI_CONCEPTS_PRIMARY_MODEL}
        fallback: {provider: $AI_CONCEPTS_FALLBACK_PROVIDER, model: $AI_CONCEPTS_FALLBACK_MODEL}
      on_complete:
        - action: index_note
          candidates:
            - {note_type: smart, path: "output/versions/notes_smart_*", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/smart.json", provenance_step: "05_smart_paper", provenance_since_version: "2"}
        - action: collect_glossary
      outputs: ["output/concepts.json"]

    "06_review":
      label: "评审"
      extends: .review
      run: steps.paper.step_06_review
      version: "2"
      needs: ["05_concepts"]
      tags: []
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      on_complete:
        - action: collect_glossary
      outputs: ["output/review.json", "output/review_input.md", "output/review_sources/*", "output/versions/review_*", "output/versions/review_input_*"]

article:
  # provider 统一 claude-cli + 显式模型,由带 claude-cli tag 的 ai worker 认领;
  # 智能笔记/评审随投递开关 smart_note 可选;概念步必跑。
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      # 慢站指数退避重试 5 拍(30→60→120→240→480s,见 step_01_download._download_article),
      # 步超时须 ≥ 各拍之和 ~930s,否则退避被腰斩;死链最坏 ~930s 才判失败(接受此代价换慢站成功率)。
      timeout: 1000
      retry: 3
      on_complete:
        - action: sync_metadata
      # 正文内图片本地化 → assets/(下载步抓取,供原文 MD 内嵌)。
      outputs: ["input/source.html", "input/metadata.json", "input/article_meta.json", "assets/*"]

    "02_parse_article":
      label: "正文解析"
      extends: .cpu-step
      run: steps.article.step_02_parse_article
      needs: ["01_download"]
      # 图片本地化网络受限:图多的页(26 图)并行 5 路仍需分批,60s 会超时。
      timeout: 300
      # 解析语义含正文图片找回与 provenance v2 support identity,旧 done 必须失效.
      version: "5"
      # 补全元信息(abstract/image/tags/author),并产出图片本地引用的可读原文 Markdown;
      # 非中文正文写 needs_translation.json 标记(供 04_translate_article 的 rules:exists 门控)。
      on_complete:
        - action: sync_metadata
      outputs: ["intermediate/parsed.json", "intermediate/source_segments.json", "output/original.md", "output/provenance/original.json", "intermediate/needs_translation.json", "assets/*"]

    "03_article_sections":
      label: "章节切分"
      extends: .cpu-step
      run: steps.article.step_03_article_sections
      needs: ["02_parse_article"]
      timeout: 60
      outputs: ["intermediate/sections.json"]

    "04_smart_article":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.article.step_04_smart_article
      version: "3"
      # needs 04_translate:非中文文章先翻译,笔记基于中文译文做(译文跳过=中文文章时依赖视为满足,读原文)。
      needs: ["03_article_sections", "04_translate_article"]
      tags: []
      # 投递开关 smart_note=on 才生成笔记;否则跳过(短文走轻链路)。
      rules:
        - if_flag: smart_note
          when: on
        - when: skip
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      outputs: ["output/versions/notes_smart_*", "output/provenance/smart.json"]

    "04_translate_article":
      label: "翻译"
      extends: .ai-step
      run: steps.article.step_04_translate_article
      needs: ["02_parse_article"]
      version: "3"   # 术语一致性:chunk 注入 term_map + 回收 term_pairs(工单 26-07-06/04),失效旧指纹
      tags: []
      # 仅非中文文章触发:02_parse 写了 needs_translation.json 才跑,中文文章跳过。
      rules:
        - exists: "intermediate/needs_translation.json"
          when: on
        - when: skip
      ai:
        primary: {provider: $AI_TRANSLATE_PRIMARY_PROVIDER, model: $AI_TRANSLATE_PRIMARY_MODEL}
        fallback: {provider: $AI_TRANSLATE_FALLBACK_PROVIDER, model: $AI_TRANSLATE_FALLBACK_MODEL}
      on_complete:
        - action: collect_term_pairs
      outputs: ["output/translated.md", "output/provenance/translated.json"]

    "05_concepts":
      label: "概念 + 摘要"
      extends: .ai-step
      run: steps.article.step_05_concepts
      version: "4"   # key_terms 增 related 关系边(rel: prerequisite/is_a/part_of/related,只引本文概念)
      # 必跑,无 rules。源优先级:智能笔记 > 译文(非中文) > original.md;一句话摘要同出。
      # needs 04_smart/04_translate:保证笔记/译文(若有)先就绪;被跳过时依赖视为满足,本步照常跑。
      needs: ["04_smart_article", "04_translate_article"]
      timeout: 120
      tags: []
      ai:
        primary: {provider: $AI_CONCEPTS_PRIMARY_PROVIDER, model: $AI_CONCEPTS_PRIMARY_MODEL}
        fallback: {provider: $AI_CONCEPTS_FALLBACK_PROVIDER, model: $AI_CONCEPTS_FALLBACK_MODEL}
      on_complete:
        - action: index_note
          # 轻链路没有 smart;按最终可用内容降级,仍只索引一个版本,避免 Ask 重复证据。
          candidates:
            - {note_type: smart, path: "output/versions/notes_smart_*", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/smart.json", provenance_step: "04_smart_article", provenance_since_version: "2"}
            - {note_type: translated, path: "output/translated.md", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/translated.json", provenance_step: "04_translate_article", provenance_since_version: "3"}
            - {note_type: original, path: "output/original.md", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/original.json", provenance_step: "02_parse_article", provenance_since_version: "4"}
        - action: collect_glossary
      outputs: ["output/concepts.json"]

    "06_review":
      label: "评审"
      extends: .review
      run: steps.article.step_05_review
      version: "2"
      needs: ["05_concepts"]
      tags: []
      # 评审跟随智能笔记(smart_note=on 才评审)。
      rules:
        - if_flag: smart_note
          when: on
        - when: skip
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      on_complete:
        - action: collect_glossary
      outputs: ["output/review.json", "output/review_input.md", "output/review_sources/*", "output/versions/review_*", "output/versions/review_input_*"]

audio:
  # provider 统一 claude-cli + 显式模型,由带 claude-cli tag 的 ai worker 认领。
  jobs:
    "01_download":
      label: "下载"
      run: steps.common.step_01_download
      pool: io
      timeout: 120
      retry: 3
      on_complete:
        - action: sync_metadata
      outputs: ["input/source.mp3", "input/source.m4a", "input/source.mp4", "input/metadata.json"]

    # 转写复用 video 的 whisper 步。
    "02_whisper":
      label: "语音转写"
      run: steps.video.step_02_whisper
      image: flori/step-gpu
      # 对齐 video 的 whisper:cpu-pool + 无 tag → 任意 cpu worker 可跑(faster-whisper CPU int8);
      # worker 有 GPU 时 select_whisper_model 自动用 GPU。刻意不配 gpu 池:无 GPU worker 时任务会无人认领卡死。
      pool: cpu
      needs: ["01_download"]
      timeout: 1800
      # 超时随音频时长伸缩:无 GPU 时 CPU base int8 跑长集约 1.3x 实时,固定 1800s 会把长集硬杀。
      # worker 跑步前读 input/metadata.json 的 duration_sec,有效超时 = clamp(max(1800, ceil(分钟)*90), 21600)。
      # 缺 metadata/duration 时退回固定 timeout。机制通用,见 shared.config.build_step_config / worker。
      timeout_per_min: 90
      timeout_max_sec: 21600
      retry: 2
      tags: []
      outputs: ["input/subtitle.srt"]

    "03_transcript_parse":
      label: "转写解析"
      extends: .cpu-step
      run: steps.audio.step_03_transcript_parse
      version: "3"
      needs: ["02_whisper"]
      timeout: 60
      outputs: ["intermediate/transcript.json", "output/transcript.md", "intermediate/segments.json", "intermediate/source_segments.json", "output/provenance/transcript.json"]

    "04_smart_podcast":
      label: "智能版笔记"
      extends: .ai-step
      run: steps.audio.step_04_smart_podcast
      version: "3"
      needs: ["03_transcript_parse"]
      tags: []
      ai:
        primary: {provider: $AI_SMART_PRIMARY_PROVIDER, model: $AI_SMART_PRIMARY_MODEL}
        fallback: {provider: $AI_SMART_FALLBACK_PROVIDER, model: $AI_SMART_FALLBACK_MODEL}
      outputs: ["output/versions/notes_smart_*", "output/provenance/smart.json"]

    "05_concepts":
      label: "概念 + 摘要"
      extends: .ai-step
      run: steps.article.step_05_concepts
      version: "4"
      # 复用 article 概念步:播客以智能笔记为源。
      needs: ["04_smart_podcast"]
      timeout: 120
      tags: []
      ai:
        primary: {provider: $AI_CONCEPTS_PRIMARY_PROVIDER, model: $AI_CONCEPTS_PRIMARY_MODEL}
        fallback: {provider: $AI_CONCEPTS_FALLBACK_PROVIDER, model: $AI_CONCEPTS_FALLBACK_MODEL}
      on_complete:
        - action: index_note
          candidates:
            - {note_type: smart, path: "output/versions/notes_smart_*", source_manifest: "intermediate/source_segments.json", provenance: "output/provenance/smart.json", provenance_step: "04_smart_podcast", provenance_since_version: "2"}
        - action: collect_glossary
      outputs: ["output/concepts.json"]

    "05_review":
      label: "评审"
      extends: .review
      run: steps.audio.step_05_review
      version: "2"
      needs: ["05_concepts"]
      tags: []
      ai:
        primary: {provider: $AI_REVIEW_PRIMARY_PROVIDER, model: $AI_REVIEW_PRIMARY_MODEL}
        fallback: {provider: $AI_REVIEW_FALLBACK_PROVIDER, model: $AI_REVIEW_FALLBACK_MODEL}
      on_complete:
        - action: collect_glossary
      outputs: ["output/review.json", "output/review_input.md", "output/review_sources/*", "output/versions/review_*", "output/versions/review_input_*"]
