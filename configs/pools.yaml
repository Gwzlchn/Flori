pools:
  io:
    limit: 999
  scene:
    limit: 1
    exclusive_group: cpu_bound
  cpu:
    limit: 3
    exclusive_group: cpu_bound
  ai:
    limit: 2
    rate_limit_sec: 5
  gpu:
    limit: 1
    fallback: cpu

exclusive_groups:
  cpu_bound:
    scene_acquires_all_cpu: true

# Worker 在线判定窗口（后端权威，全栈共用一套阈值）。
worker_status:
  heartbeat_interval_sec: 10   # worker 端心跳节拍
  online_window_sec: 30        # 3x 心跳，容忍丢两拍仍判在线
  stale_window_sec: 900        # 15min 仍无心跳判 stale，供 GC 回收僵尸
