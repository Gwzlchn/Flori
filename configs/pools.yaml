# 资源池配置:仅声明每池默认并发上限(limit)与 worker 在线判定窗口。
# limit 是默认天花板,运行时可经 redis hash `pool_limit_overrides` 覆盖收紧。
# 覆盖入口是前端 PUT /api/config/pool-limits,即时对直连 + 网关两路 worker 生效;null=清除回落默认。
# 默认放开到 1024(基本不限);实际单机并发由 per-worker WORKER_CONCURRENCY 控制。
# 池的拓扑关系是代码权威,不在此配置:
#   - worker 订阅哪些池 → 启动参数 --pools 显式声明(worker/main.py);
#   - 哪些池可出网 → worker/step_runner.py 的 _NETWORKED_POOLS。
pools:
  io:
    limit: 1024
  cpu:
    limit: 1024
  ai:
    limit: 1024
  gpu:
    limit: 1024

# Worker 在线判定窗口(后端权威,全栈共用一套阈值)。
worker_status:
  heartbeat_interval_sec: 10   # worker 端心跳节拍
  online_window_sec: 30        # 3x 心跳,容忍丢两拍仍判在线
  stale_window_sec: 900        # 15min 仍无心跳判 stale,供 GC 回收僵尸

# 接单健康门:io/cpu/ai 是当前四类流水线的基础能力;gpu 是可选加速,离线只降级.
# 磁盘必须同时满足绝对值和百分比阈值,避免小盘按 GB 误伤或大盘仅剩少量空间.
readiness:
  disk_min_free_gb: ${FLORI_DISK_MIN_FREE_GB:-5}
  disk_min_free_pct: ${FLORI_DISK_MIN_FREE_PCT:-5}
  probe_ttl_sec: ${FLORI_READINESS_PROBE_TTL_SEC:-5}
  probe_timeout_sec: ${FLORI_READINESS_PROBE_TIMEOUT_SEC:-3}
  required_pools: [io, cpu, ai]
  optional_pools: [gpu]
