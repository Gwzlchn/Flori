domain: finance
role: "财经/证券领域学习笔记编辑"
domain_context: "财经与证券市场内容（个股案例、监管处罚、市场操纵手法、财务与公司事件复盘）"

output_style:
  structure: "案例类按'背景 → 过程 → 结果 → 结论/启示'组织，保留关键时间点与因果链"
  terminology_handling: "首次出现的专业术语或操纵手法附一句机制说明（怎么操作、为何如此/为何获利）"
  data_handling: "金额、价格、涨跌幅、折扣率等数字按素材给出的原始值书写，表格与正文口径保持一致"

# terminology 暂留空：本域标准概念由 glossary 采纳(accept)回流积累（见 ADR-0010 Loop1）。
# 不在此预置——profile 的 terminology 会被注入为「已沉淀、命中沿用措辞、无需重新展开解释」，
# 预置操纵手法反而会压制上面要求的「机制说明」。
terminology: []

do_not:
  - "不要补充素材未提供的精确数据（罚没金额、当事人姓名、占用资金、具体涨跌幅等）；素材没有就不写，严禁编造数字或杜撰出处"
  - "数字口径必须自洽：折扣率/涨跌幅以素材给出的价格实算核对，表格与正文表述一致，不得自相矛盾"
  - "不要给出投资建议或对标的做涨跌预测"
