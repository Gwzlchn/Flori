# Flori 远程 worker:只走 Gateway 出站 HTTPS,不暴露 Redis/MinIO 隧道。
#
# 首次接入:
#   1. 在 /system 生成 flw- 接入 token;
#   2. 复制到 WORKER_REGISTRATION_TOKEN;
#   3. 运行 docker compose -f worker.yml up -d worker-cpu。
#
# 注册成功后 worker.id 与 worker.token 写入 /home/worker。后续重启、Watchtower recreate
# 都用 worker.token resume,不再依赖 flw- token。

x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

x-worker-env: &worker-env
  HOME: /home/worker
  CONFIG_DIR: /app/configs
  WORK_DIR: /tmp/flori-work
  GATEWAY_URL: ${GATEWAY_URL:?GATEWAY_URL is required}
  WORKER_REGISTRATION_TOKEN: ${WORKER_REGISTRATION_TOKEN:?WORKER_REGISTRATION_TOKEN is required}
  WORKER_ID_FILE: /home/worker/worker.id
  WORKER_TOKEN_FILE: /home/worker/worker.token
  FLORI_STEP_LOG_MAX_BYTES: ${FLORI_STEP_LOG_MAX_BYTES:-10485760}
  FLORI_DOCKER_CONTROL_TIMEOUT_SEC: ${FLORI_DOCKER_CONTROL_TIMEOUT_SEC:-5}

services:
  worker-cpu:
    image: ghcr.io/${IMAGE_OWNER:?IMAGE_OWNER is required}/flori-worker:${IMAGE_TAG:-latest}
    container_name: flori-worker-cpu
    restart: unless-stopped
    logging: *default-logging
    command: python -m worker.main --pools cpu
    environment:
      <<: *worker-env
      WORKER_NAME: ${WORKER_NAME_CPU:-edge-cpu}
      MODEL_CACHE_DIR: /cache
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - worker-cpu-state:/home/worker
      - worker-cache:/cache
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  worker-ai:
    image: ghcr.io/${IMAGE_OWNER:?IMAGE_OWNER is required}/flori-worker:${IMAGE_TAG:-latest}
    container_name: flori-worker-ai
    restart: unless-stopped
    logging: *default-logging
    command: python -m worker.main --pools ai
    environment:
      <<: *worker-env
      WORKER_NAME: ${WORKER_NAME_AI:-edge-ai}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
    volumes:
      - worker-ai-state:/home/worker
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: ghcr.io/containrrr/watchtower:latest
    container_name: flori-worker-watchtower
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - watchtower
    command: --label-enable --cleanup --interval ${WATCHTOWER_INTERVAL_SEC:-240}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  worker-cpu-state:
  worker-ai-state:
  worker-cache:
