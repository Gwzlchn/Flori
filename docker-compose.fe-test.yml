# 前端单测 + 覆盖率(容器化,宿主机不装 node 依赖)。
name: flori-fe-test
# 跑:  docker compose -f docker-compose.fe-test.yml run --rm fe-test
# node:22-alpine 与 frontend/Dockerfile 同基;npmmirror 直连(出站代理已放行)。
# 项目名固定 flori-fe-test,与其余 flori-* 栈命名一致。
services:
  fe-test:
    image: node:22-alpine
    working_dir: /app
    environment:
      npm_config_registry: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
      FE_INSTALL_MODE: ${FE_INSTALL_MODE:-install}
    volumes:
      - ./frontend:/app
      - fe_node_modules:/app/node_modules   # node_modules 放卷里,不污染工作区、re-run 更快
      - ${NPM_CACHE_DIR:-fe_npm_cache}:/root/.npm
      - ./scripts:/repo-scripts:ro
    # 本地保留 npm install 热卷;CI 通过 FE_INSTALL_MODE=ci 改用锁文件安装.
    command: ["sh", "/repo-scripts/fe-test.sh"]

volumes:
  fe_node_modules:
  fe_npm_cache:
