# 前端单测 + 覆盖率(容器化,宿主机不装 node 依赖)。
name: flori-fe-test
# 跑:  docker compose -f docker-compose.fe-test.yml run --rm fe-test
# node:22-alpine 与 frontend/Dockerfile 同基;npmmirror 直连(出站代理已放行)。
# 项目名固定 flori-fe-test,与其余 flori-* 栈命名一致。
services:
  fe-test:
    image: node:22-alpine
    working_dir: /app
    environment:
      - npm_config_registry=https://registry.npmmirror.com
    volumes:
      - ./frontend:/app
      - fe_node_modules:/app/node_modules   # node_modules 放卷里,不污染工作区、re-run 更快
    # vue-tsc 前置:vitest 不做类型检查,watched/WorkerInfo 两次类型事故都拖到镜像 build 才炸
    # (2026-07-06/07);在此前置与 frontend/Dockerfile 的 npm run build 同款 tsc,本地/CI 同吃。
    command: sh -c "npm install --no-audit --no-fund && npx vue-tsc --noEmit && npx vitest run --coverage"

volumes:
  fe_node_modules:
